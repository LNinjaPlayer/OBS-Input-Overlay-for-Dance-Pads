<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Independent Input-Overlay Layout Renderer</title>
    <style>
        body, html { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background-color: transparent; 
            overflow: hidden; 
        }
        .canvas-container { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
        }
        #canvas { 
            image-rendering: -moz-crisp-edges;
            image-rendering: pixelated; 
            width: 100%; 
            height: 100%; 
        }
        #status-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: rgba(255,255,255,0.7);
            font-family: sans-serif;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="status-overlay">Waiting for input... Press any button on Controller</div>
    <div id="canvas-container" class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // --- CONSTANTS & CONFIG ---
        const TEXTURE_SPACE = 3;
        
        // Preset Layout Data
        const preset = {
            "default_width": 260, "default_height": 260, "overlay_width": 260, "overlay_height": 260,
            "elements": [
                { "id": "body", "mapping": [0, 0, 260, 260], "pos": [0, 0], "type": 0, "z_level": 0 },
                { "type": 2, "id": "a", "code": 0, "pos": [6, 90], "z_level": 1, "mapping": [0, 300, 81, 80] },
                { "type": 2, "id": "b", "code": 1, "pos": [173, 90], "z_level": 1, "mapping": [243, 300, 81, 80] },
                { "type": 2, "id": "x", "code": 2, "pos": [90, 6], "z_level": 1, "mapping": [162, 300, 81, 80] },
                { "type": 2, "id": "y", "code": 3, "pos": [90, 174], "z_level": 1, "mapping": [81, 300, 81, 80] }
            ]
        };

        // --- ENGINE INSTANCES ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusOverlay = document.getElementById('status-overlay');
        
        let atlas = new Image();
        let elements = [];
        let targetPadIndex = 0;

        // Parse Targeted Controller Index from URL Query String (?pad=0 or ?pad=1)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('pad')) {
            targetPadIndex = parseInt(urlParams.get('pad'), 10);
        }
        statusOverlay.innerText = `Gamepad Index Targeted: [${targetPadIndex}] - Press any button`;

        // --- ELEMENT CLASSES ---
        class TextureElement {
            constructor(data) {
                this.data = data;
            }
            zLevel() { return this.data.z_level || 0; }
            pos() { return this.data.pos; }
            mapping() { return this.data.mapping; }
            
            update(gamepadState) {} // Base stub
            
            draw() {
                if (!atlas.complete) return;
                const m = this.mapping();
                const p = this.pos();
                ctx.drawImage(atlas, m[0], m[1], m[2], m[3], p[0], p[1], m[2], m[3]);
            }
        }

        class GamepadButtonElement extends TextureElement {
            constructor(data) {
                super(data);
                this.active = false;
            }
            
            update(gamepadState) {
                const buttonCode = this.data.code;
                if (gamepadState && gamepadState.buttons && buttonCode < gamepadState.buttons.length) {
                    this.active = gamepadState.buttons[buttonCode].pressed;
                } else {
                    this.active = false;
                }
            }
            
            draw() {
                if (!atlas.complete) return;
                const m = this.mapping();
                const p = this.pos();
                // Shifts texture sampling space horizontally if pressed
                const offsetY = this.active ? (TEXTURE_SPACE + m[3]) : 0;
                
                ctx.drawImage(atlas, m[0], m[1] + offsetY, m[2], m[3], p[0], p[1], m[2], m[3]);
            }
        }

        // --- LIFECYCLE CONTROLLER ---
        function initLayout() {
            elements = preset.elements.map(el => {
                if (el.type === 2) return new GamepadButtonElement(el);
                return new TextureElement(el);
            });
            // Sort by layers
            elements.sort((a, b) => a.zLevel() - b.zLevel());
            resizeCanvas();
        }

        function resizeCanvas() {
            canvas.width = preset.overlay_width || 260;
            canvas.height = preset.overlay_height || 260;
            ctx.imageSmoothingEnabled = false;
        }

        // Main App Run loop frame loop
        function tick() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            const activePad = gamepads[targetPadIndex];

            if (activePad) {
                statusOverlay.style.display = 'none'; // Hide overlay once connection verifies active state
                elements.forEach(el => el.update(activePad));
            } else {
                statusOverlay.style.display = 'block';
            }

            // Render Frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            elements.forEach(el => el.draw());

            requestAnimationFrame(tick);
        }

        // Listeners & Initialization
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener("gamepadconnected", (e) => {
            if (e.gamepad.index === targetPadIndex) {
                statusOverlay.style.display = 'none';
            }
        });

        // Initialize App Assets
        atlas.src = "./texture.png";
        initLayout();
        requestAnimationFrame(tick);
    </script>
</body>
</html>
